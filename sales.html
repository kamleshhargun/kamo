<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales</title>

<style>
body { font-family: Arial; background:#f1f5f9; padding:20px; }
input, button { width:100%; padding:10px; margin:5px 0; }
.card { background:white; padding:20px; border-radius:10px; }
</style>
</head>

<body>

<h2>Sales Entry</h2>

<div class="card">
<input id="orderId" placeholder="Order ID">
<input id="amount" placeholder="Amount">
<button onclick="save()">Save</button>
</div>

<script>
function save() {
  let order = document.getElementById("orderId").value;
  let amount = document.getElementById("amount").value;

  let data = JSON.parse(localStorage.getItem("sales") || "[]");

  data.push({order, amount});

  localStorage.setItem("sales", JSON.stringify(data));

  alert("Sale Saved");
}
</script>

</body>
</html>

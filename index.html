<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERP Dashboard</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f1f5f9;
}

/* TOP BAR */
.topbar {
  background: #0f172a;
  color: white;
  padding: 15px;
  font-size: 18px;
}

/* SIDEBAR */
.sidebar {
  width: 220px;
  height: 100vh;
  background: #1e293b;
  position: fixed;
  top: 0;
  left: 0;
  padding-top: 60px;
}

.sidebar a {
  display: block;
  color: #cbd5f5;
  padding: 12px 20px;
  text-decoration: none;
}

.sidebar a:hover {
  background: #334155;
  color: white;
}

/* MAIN */
.main {
  margin-left: 220px;
  padding: 20px;
}

/* CARDS */
.card {
  background: white;
  padding: 20px;
  margin-bottom: 15px;
  border-radius: 10px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

</style>
</head>

<body>

<div class="topbar">ERP Dashboard</div>

<div class="sidebar">
  <a href="pickup.html">Pickup</a>
  <a href="return.html">Return</a>
  <a href="lookup.html">Order Lookup</a>
  <a href="tracking.html">Tracking</a>
  <a href="purchase.html">Purchase</a>
  <a href="cutting.html">Cutting</a>
  <a href="stitching.html">Stitching</a>
  <a href="finished.html">Finished</a>
  <a href="sales.html">Sales</a>
</div>

<div class="main">

  <div class="card">📦 Total Orders: <span id="orders">0</span></div>
  <div class="card">🚚 Pickup Today: <span id="pickup">0</span></div>
  <div class="card">✅ Finished: <span id="finished">0</span></div>

</div>

<script>
document.getElementById("orders").innerText = localStorage.getItem("orders") || 0;
document.getElementById("pickup").innerText = localStorage.getItem("pickup") || 0;
document.getElementById("finished").innerText = localStorage.getItem("finished") || 0;
</script>

</body>
</html>

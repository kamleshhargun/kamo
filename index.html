<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERP Dashboard</title>

<style>

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial;
}

/* HEADER */
.header {
  background: #1f2937;
  padding: 0 20px;
}

/* NAVBAR */
.nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

/* LOGO */
.logo {
  color: white;
  font-size: 20px;
  font-weight: bold;
}

/* MENU */
.menu {
  list-style: none;
  display: flex;
}

.menu li {
  position: relative;
}

.menu a {
  color: white;
  padding: 15px 18px;
  display: block;
  text-decoration: none;
  transition: 0.2s;
}

.menu a:hover {
  background: #374151;
}

/* SUBMENU */
.submenu {
  position: absolute;
  top: 100%;
  left: 0;
  background: white;
  min-width: 180px;

  display: none;
  flex-direction: column;

  border-radius: 5px;
  overflow: hidden;
}

.submenu a {
  color: black;
  padding: 12px;
}

.submenu a:hover {
  background: #f3f4f6;
}

/* SHOW SUBMENU */
.dropdown:hover .submenu {
  display: flex;
}

/* MOBILE BUTTON */
.menu-toggle {
  display: none;
  background: none;
  border: none;
  color: white;
  font-size: 22px;
}

/* MOBILE */
@media (max-width: 768px) {

  .menu-toggle {
    display: block;
  }

  .menu {
    display: none;
    flex-direction: column;
    width: 100%;
  }

  .menu.active {
    display: flex;
  }

  .submenu {
    position: static;
    display: none;
    background: #374151;
  }

  .submenu a {
    color: white;
  }

  .submenu.active {
    display: flex;
  }

}

</style>
</head>

<body>

<header class="header">
  <div class="nav">

    <div class="logo">ERP System</div>

    <button class="menu-toggle">☰</button>

    <ul class="menu">

      <!-- DAILY MENU -->
      <li class="dropdown">
        <a href="#">Daily Menu</a>

        <div class="submenu">
          <a href="pickup.html">Pickup</a>
          <a href="return.html">Return</a>
        </div>
      </li>

      <li><a href="lookup.html">Order Lookup</a></li>
      <li><a href="tracking.html">Order Tracking</a></li>
      <li><a href="purchase.html">Purchase</a></li>
      <li><a href="cutting.html">Cutting</a></li>
      <li><a href="stitching.html">Stitching</a></li>
      <li><a href="finished.html">Finished</a></li>
      <li><a href="sales.html">Sales</a></li>

    </ul>

  </div>
</header>

<script>

/* MOBILE MENU */
document.querySelector(".menu-toggle").onclick = function() {
  document.querySelector(".menu").classList.toggle("active");
};

/* MOBILE SUBMENU */
document.querySelectorAll(".dropdown > a").forEach(item => {
  item.onclick = function(e) {

    if (window.innerWidth <= 768) {
      e.preventDefault();
      this.nextElementSibling.classList.toggle("active");
    }

  }
});

</script>

</body>
</html>

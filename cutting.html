<script>
function save() {
  let order = document.getElementById("orderId").value;

  let data = JSON.parse(localStorage.getItem("cutting") || "[]");
  data.push(order);

  localStorage.setItem("cutting", JSON.stringify(data));

  alert("Cutting Done");
}
</script>
